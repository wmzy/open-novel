name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests (with coverage)
        run: npx vitest run --coverage

      - name: Coverage threshold check
        run: |
          npx vitest run --coverage 2>&1 | tee /tmp/coverage.txt
          # Fail if any threshold drops below acceptable levels
          node -e "
            const fs = require('fs');
            const out = fs.readFileSync('/tmp/coverage.txt', 'utf8');
            const m = out.match(/Statements\s*:\s*([\d.]+)%/);
            if (m && parseFloat(m[1]) < 55) { console.error('Coverage ' + m[1] + '% < 55% threshold'); process.exit(1); }
            console.log('Coverage OK: ' + (m ? m[1] : 'unknown') + '%');
          "

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
